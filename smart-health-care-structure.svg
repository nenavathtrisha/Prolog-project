<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111F"/>
      <stop offset="1" stop-color="#0E2240"/>
    </linearGradient>
    <linearGradient id="panel" x1="300" y1="150" x2="1300" y2="1030" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EAF2FF"/>
    </linearGradient>
    <filter id="shadow" x="250" y="120" width="1100" height="950" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#02101E" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 56px 'Segoe UI', Arial, sans-serif; fill: #F7FBFF; }
      .subtitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #B8CBE8; letter-spacing: 2px; }
      .heading { font: 800 26px 'Segoe UI', Arial, sans-serif; fill: #10264A; }
      .section { font: 800 22px 'Segoe UI', Arial, sans-serif; }
      .file { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #173159; }
      .desc { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #4C6488; }
      .small { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #5D7396; }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1460" cy="140" r="170" fill="#1F5FD8" fill-opacity="0.12"/>
  <circle cx="120" cy="1080" r="200" fill="#7FB3FF" fill-opacity="0.08"/>

  <text x="800" y="95" text-anchor="middle" class="subtitle">SOURCE CODE</text>
  <text x="800" y="155" text-anchor="middle" class="title">SMART HEALTH CARE AND WELLNESS SYSTEM</text>

  <g filter="url(#shadow)">
    <rect x="280" y="190" width="1040" height="930" rx="34" fill="url(#panel)"/>
  </g>

  <rect x="330" y="235" width="940" height="54" rx="18" fill="#DDEBFF"/>
  <text x="800" y="270" text-anchor="middle" class="heading">PROJECT STRUCTURE</text>

  <g>
    <rect x="345" y="315" width="910" height="160" rx="20" fill="#EAF7EE" stroke="#BFE2C8"/>
    <text x="375" y="348" class="section" fill="#1C7A43">data/</text>
    <text x="1165" y="348" text-anchor="end" class="small">JSON data storage</text>

    <text x="390" y="385" class="file">users.json</text>
    <text x="735" y="385" class="desc">Registered user accounts</text>
    <text x="390" y="418" class="file">records.json</text>
    <text x="735" y="418" class="desc">Patient details, symptoms, reports</text>
    <text x="390" y="451" class="file">feedback.json</text>
    <text x="735" y="451" class="desc">Patient stars and comments</text>
  </g>

  <g>
    <rect x="345" y="495" width="910" height="95" rx="20" fill="#EEF1FF" stroke="#CBD4FF"/>
    <text x="375" y="528" class="section" fill="#4A55D4">prolog/</text>
    <text x="1165" y="528" text-anchor="end" class="small">Expert system rules</text>

    <text x="390" y="566" class="file">health_expert.pl</text>
    <text x="735" y="566" class="desc">Medical knowledge base and inference engine</text>
  </g>

  <g>
    <rect x="345" y="610" width="910" height="230" rx="20" fill="#FFF3E8" stroke="#FFD5AE"/>
    <text x="375" y="643" class="section" fill="#D07012">Frontend Pages and Assets</text>
    <text x="1165" y="643" text-anchor="end" class="small">User interface</text>

    <text x="390" y="680" class="file">index.html</text>
    <text x="735" y="680" class="desc">Login and registration page</text>
    <text x="390" y="713" class="file">patient-details.html</text>
    <text x="735" y="713" class="desc">Patient details form</text>
    <text x="390" y="746" class="file">symptoms.html</text>
    <text x="735" y="746" class="desc">Symptoms selection page</text>
    <text x="390" y="779" class="file">report.html</text>
    <text x="735" y="779" class="desc">Generated health report page</text>
    <text x="390" y="812" class="file">feedback.html</text>
    <text x="735" y="812" class="desc">Feedback page with star rating</text>

    <text x="930" y="680" class="file">dashboard.html</text>
    <text x="1120" y="680" class="desc">Dashboard screen</text>
    <text x="930" y="713" class="file">styles.css</text>
    <text x="1120" y="713" class="desc">Shared website styling</text>
    <text x="930" y="746" class="file">auth.js</text>
    <text x="1120" y="746" class="desc">Login and registration logic</text>
    <text x="930" y="779" class="file">flow.js</text>
    <text x="1120" y="779" class="desc">Multi-step page flow logic</text>
  </g>

  <g>
    <rect x="345" y="860" width="910" height="145" rx="20" fill="#E9F5FF" stroke="#B8DBF5"/>
    <text x="375" y="893" class="section" fill="#1471A6">Backend and Deployment</text>
    <text x="1165" y="893" text-anchor="end" class="small">Server and hosting setup</text>

    <text x="390" y="930" class="file">server.js</text>
    <text x="735" y="930" class="desc">Node.js backend server and API routes</text>
    <text x="390" y="963" class="file">package.json</text>
    <text x="735" y="963" class="desc">Project configuration and scripts</text>
    <text x="390" y="996" class="file">render.yaml</text>
    <text x="735" y="996" class="desc">Render deployment configuration</text>
  </g>

  <g>
    <rect x="345" y="1025" width="910" height="70" rx="20" fill="#F3F5F9" stroke="#D9E0EA"/>
    <text x="390" y="1068" class="file">README.md</text>
    <text x="735" y="1068" class="desc">Project documentation and deployment guide</text>
  </g>

  <g stroke="#B8CBE8" stroke-width="4" stroke-linecap="round">
    <line x1="365" y1="350" x2="365" y2="1050"/>
    <line x1="365" y1="350" x2="380" y2="350"/>
    <line x1="365" y1="528" x2="380" y2="528"/>
    <line x1="365" y1="643" x2="380" y2="643"/>
    <line x1="365" y1="893" x2="380" y2="893"/>
    <line x1="365" y1="1060" x2="380" y2="1060"/>
  </g>
</svg>
