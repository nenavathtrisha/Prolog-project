<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Health Care and Wellness System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <div class="shell auth-shell">
    <section class="auth-panel">
      <div class="auth-brand">
        <div class="auth-mini-art">
          <svg viewBox="0 0 220 220" class="doctor-svg doctor-svg-small" aria-label="Small doctor illustration" role="img">
            <circle cx="110" cy="110" r="86" fill="rgba(77,141,255,0.12)"></circle>
            <circle cx="110" cy="70" r="28" fill="#f3c7a5"></circle>
            <path d="M82 70c5-20 15-32 28-32s23 12 28 32c-9-7-18-10-28-10s-19 3-28 10z" fill="#162b56"></path>
            <rect x="90" y="95" width="40" height="16" rx="8" fill="#f3c7a5"></rect>
            <path d="M60 170c6-40 25-62 50-62s44 22 50 62z" fill="#eef4ff"></path>
            <path d="M87 111h46l-11 59h-24z" fill="#ffffff"></path>
            <path d="M142 118c19 7 32 22 37 45" fill="none" stroke="#84aef8" stroke-width="6" stroke-linecap="round"></path>
            <path d="M161 120c0-8 7-15 15-15s15 7 15 15-7 15-15 15-15-7-15-15z" fill="none" stroke="#84aef8" stroke-width="6"></path>
            <circle cx="188" cy="161" r="7" fill="#84aef8"></circle>
          </svg>
        </div>
        <p class="eyebrow">Smart Health Care and Wellness System</p>
        <h1>Smart Health Care and Wellness System</h1>
        <p class="hero-text">Login details</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login" type="button">Login</button>
        <button class="auth-tab" data-mode="register" type="button">Register</button>
      </div>

      <div class="panel-head">
        <p class="eyebrow" id="authEyebrow">Welcome back</p>
        <h2 id="authTitle">Access your wellness dashboard</h2>
      </div>

      <form id="authForm" class="auth-form">
        <label id="nameField" class="hidden">
          Full name
          <input id="name" type="text" placeholder="Drishti Verma">
        </label>

        <label>
          Email address
          <input id="email" type="email" placeholder="you@example.com" required>
        </label>

        <label>
          Password
          <input id="password" type="password" placeholder="Enter your password" required>
        </label>

        <button class="button primary auth-submit" type="submit" id="authSubmit">Login</button>
      </form>

      <p class="auth-status" id="authStatus">Use the register tab to create a new patient account.</p>
    </section>
  </div>

  <script src="auth.js"></script>
</body>
</html>
